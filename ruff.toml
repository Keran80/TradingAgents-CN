# Ruff 配置文件 - TradingAgents-CN
# 文档: https://docs.astral.sh/ruff/

# 行长度限制
line-length = 127

# 目标 Python 版本
target-version = "py310"

# 启用的规则
select = [
    "E",    # pycodestyle 错误
    "W",    # pycodestyle 警告
    "F",    # Pyflakes
    "I",    # isort (导入排序)
    "UP",   # pyupgrade (升级到新语法)
]

# 忽略的规则
ignore = [
    "E501",  # 行太长 (已由 line-length = 127 处理)
]

# 排除的目录
exclude = [
    "tests/",
    "__pycache__/",
    ".git/",
    "node_modules/",
    ".venv/",
    "venv/",
    ".eggs/",
    "build/",
    "dist/",
]

# 导入排序配置
[lint.isort]
known-first-party = ["tradingagents"]
combine-as-imports = true
