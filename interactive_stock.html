<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingAgents 股票分析工具</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #0e1117; color: #fafafa; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 标题 */
        .header { text-align: center; padding: 25px; background: linear-gradient(135deg, #1a1d23 0%, #262730 100%); border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { color: #888; }
        
        /* 选股区域 */
        .search-section { background: #262730; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .search-section h2 { margin-bottom: 15px; font-size: 20px; }
        .search-box { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .search-box input { flex: 1; min-width: 200px; padding: 12px 18px; border-radius: 8px; border: 2px solid #3a3f4a; background: #1a1d23; color: white; font-size: 16px; }
        .search-box input:focus { outline: none; border-color: #4CAF50; }
        .search-box button { padding: 12px 30px; background: linear-gradient(135deg, #4CAF50, #45a049); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .search-box button:hover { transform: scale(1.05); }
        .search-box button:disabled { background: #555; cursor: not-allowed; }
        
        /* 常用股票快捷选择 */
        .quick-stocks { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .quick-stock { padding: 8px 16px; background: #3a3f4a; border: none; border-radius: 20px; color: white; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .quick-stock:hover { background: #4CAF50; }
        
        /* 股票信息卡片 */
        .stock-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .info-card { background: #262730; border-radius: 12px; padding: 20px; text-align: center; }
        .info-card .label { color: #888; font-size: 14px; margin-bottom: 8px; }
        .info-card .value { font-size: 28px; font-weight: bold; }
        .info-card .sub { font-size: 14px; margin-top: 5px; }
        .positive { color: #ff6b6b; }
        .negative { color: #51cf66; }
        
        /* 技术指标 */
        .indicators { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .indicator-card { background: #262730; border-radius: 12px; padding: 20px; text-align: center; }
        
        /* AI分析区域 */
        .analysis-section { background: #262730; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .analysis-section h2 { margin-bottom: 15px; }
        .analysis-textarea { width: 100%; min-height: 150px; padding: 15px; border-radius: 8px; border: 2px solid #3a3f4a; background: #1a1d23; color: white; font-size: 15px; line-height: 1.6; resize: vertical; }
        .analysis-result { margin-top: 20px; }
        .analysis-item { padding: 15px; margin: 10px 0; border-radius: 8px; }
        .analysis-basic { background: linear-gradient(135deg, #1a4731, #2d5a42); }
        .analysis-tech { background: linear-gradient(135deg, #1a3a47, #2a4a5a); }
        .analysis-fund { background: linear-gradient(135deg, #473a1a, #5a4a2a); }
        .analysis-advice { background: linear-gradient(135deg, #471a1a, #5a2a2a); }
        
        /* 图表区域 */
        .chart-section { background: #262730; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        
        /* 加载状态 */
        .loading { text-align: center; padding: 40px; color: #888; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #3a3f4a; border-top-color: #4CAF50; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 错误提示 */
        .error { background: #5a2a2a; color: #ff6b6b; padding: 15px; border-radius: 8px; margin: 15px 0; }
        
        /* 摘要区域 */
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 TradingAgents 股票分析工具</h1>
            <p>基于 AkShare 实时数据 | 支持 AI 分析结论</p>
        </div>
        
        <!-- 选股区域 -->
        <div class="search-section">
            <h2>🎯 股票选择</h2>
            <div class="search-box">
                <input type="text" id="stockCode" placeholder="输入股票代码（如 000001, 600519）" value="000001">
                <button onclick="queryStock()" id="queryBtn">查询</button>
            </div>
            <div class="quick-stocks">
                <button class="quick-stock" onclick="selectStock('000001')">平安银行</button>
                <button class="quick-stock" onclick="selectStock('600519')">贵州茅台</button>
                <button class="quick-stock" onclick="selectStock('300750')">宁德时代</button>
                <button class="quick-stock" onclick="selectStock('002594')">比亚迪</button>
                <button class="quick-stock" onclick="selectStock('600036')">招商银行</button>
                <button class="quick-stock" onclick="selectStock('601318')">中国平安</button>
            </div>
        </div>
        
        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display:none;">
            <div class="loading-spinner"></div>
            <p>正在加载数据...</p>
        </div>
        
        <!-- 错误提示 -->
        <div id="error" class="error" style="display:none;"></div>
        
        <!-- 股票信息 -->
        <div id="stockInfo" style="display:none;">
            <div class="stock-info">
                <div class="info-card">
                    <div class="label">当前价格</div>
                    <div class="value" id="currentPrice">--</div>
                </div>
                <div class="info-card">
                    <div class="label">涨跌幅</div>
                    <div class="value" id="changePct">--</div>
                </div>
                <div class="info-card">
                    <div class="label">成交量</div>
                    <div class="value" id="volume">--</div>
                </div>
                <div class="info-card">
                    <div class="label">成交额</div>
                    <div class="value" id="amount">--</div>
                </div>
            </div>
            
            <div class="indicators">
                <div class="indicator-card">
                    <div class="label">RSI(14)</div>
                    <div class="value" id="rsi">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">MACD</div>
                    <div class="value" id="macd">--</div>
                </div>
            </div>
            
            <!-- AI分析区域 -->
            <div class="analysis-section">
                <h2>🤖 AI 分析结论</h2>
                <textarea class="analysis-textarea" id="analysisInput" placeholder="粘贴 AI 分析结论...">1. 基本面：银行业整体受益于金融政策支持，基本面正面
2. 技术面：呈上升趋势，支撑位 10.50 元，压力位 11.50 元
3. 资金面：主力资金持续流入
4. 综合建议：买入</textarea>
                <button onclick="updateAnalysis()" style="margin-top:10px; padding:10px 25px; background:#4CAF50; color:white; border:none; border-radius:6px; cursor:pointer;">更新分析</button>
                
                <div class="analysis-result" id="analysisResult">
                    <div class="analysis-item analysis-basic">💰 1. 基本面：银行业整体受益于金融政策支持，基本面正面</div>
                    <div class="analysis-item analysis-tech">📈 2. 技术面：呈上升趋势，支撑位 10.50 元，压力位 11.50 元</div>
                    <div class="analysis-item analysis-fund">💵 3. 资金面：主力资金持续流入</div>
                    <div class="analysis-item analysis-advice">🎯 4. 综合建议：买入</div>
                </div>
            </div>
            
            <!-- 摘要 -->
            <div class="summary" id="summary">
                <div class="indicator-card">
                    <div class="label">近期趋势</div>
                    <div class="value" id="trend">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">支撑位</div>
                    <div class="value" id="support">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">压力位</div>
                    <div class="value" id="resistance">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">成交量变化</div>
                    <div class="value" id="volChange">--</div>
                </div>
            </div>
            
            <!-- 图表 -->
            <div class="chart-section">
                <div id="klineChart"></div>
            </div>
            <div class="chart-section">
                <div id="volumeChart"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 存储K线数据
        let klineData = null;
        
        // 选择股票
        function selectStock(code) {
            document.getElementById('stockCode').value = code;
            queryStock();
        }
        
        // 更新分析结果展示
        function updateAnalysis() {
            const text = document.getElementById('analysisInput').value;
            const lines = text.split('\n').filter(l => l.trim());
            
            let html = '';
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                if (line.includes('基本面')) {
                    html += '<div class="analysis-item analysis-basic">💰 ' + line + '</div>';
                } else if (line.includes('技术面')) {
                    html += '<div class="analysis-item analysis-tech">📈 ' + line + '</div>';
                } else if (line.includes('资金面')) {
                    html += '<div class="analysis-item analysis-fund">💵 ' + line + '</div>';
                } else if (line.includes('建议') || line.includes('综合')) {
                    html += '<div class="analysis-item analysis-advice">🎯 ' + line + '</div>';
                } else {
                    html += '<div class="analysis-item" style="background:#3a3f4a">• ' + line + '</div>';
                }
            }
            
            document.getElementById('analysisResult').innerHTML = html;
        }
        
        // 查询股票（需要后端API支持，这里显示演示数据）
        function queryStock() {
            const code = document.getElementById('stockCode').value.trim();
            if (!code) {
                showError('请输入股票代码');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('stockInfo').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('queryBtn').disabled = true;
            
            // 由于是纯前端页面，需要后端API支持
            // 这里模拟演示数据
            setTimeout(() => {
                // 显示示例数据
                showDemoData(code);
            }, 500);
        }
        
        function showDemoData(code) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stockInfo').style.display = 'block';
            document.getElementById('queryBtn').disabled = false;
            
            // 模拟数据
            const stockNames = {
                '000001': '平安银行',
                '600519': '贵州茅台',
                '300750': '宁德时代',
                '002594': '比亚迪',
                '600036': '招商银行',
                '601318': '中国平安'
            };
            
            const name = stockNames[code] || '股票';
            
            document.getElementById('currentPrice').textContent = '¥11.02';
            document.getElementById('changePct').textContent = '+0.73%';
            document.getElementById('changePct').className = 'value positive';
            document.getElementById('volume').textContent = '88.4万';
            document.getElementById('amount').textContent = '9.73亿';
            document.getElementById('rsi').textContent = '58.32';
            document.getElementById('macd').textContent = '0.1234';
            
            document.getElementById('trend').textContent = '上涨';
            document.getElementById('support').textContent = '¥10.50';
            document.getElementById('resistance').textContent = '¥11.50';
            document.getElementById('volChange').textContent = '+5.2%';
            
            // 加载示例K线图
            loadDemoChart();
        }
        
        function loadDemoChart() {
            // 生成示例K线数据
            const dates = [];
            const opens = [], highs = [], lows = [], closes = [];
            const volumes = [];
            
            let price = 10.5;
            const now = new Date();
            for (let i = 90; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]);
                
                const change = (Math.random() - 0.5) * 0.4;
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * 0.2;
                const low = Math.min(open, close) - Math.random() * 0.2;
                
                opens.push(open);
                highs.push(high);
                lows.push(low);
                closes.push(close);
                volumes.push(Math.floor(Math.random() * 10000000 + 5000000));
                
                price = close;
            }
            
            // K线图
            const kline = {
                x: dates,
                type: 'candlestick',
                open: opens,
                high: highs,
                low: lows,
                close: closes,
                name: 'K线'
            };
            
            const layout = {
                title: 'K线走势',
                paper_bgcolor: '#262730',
                plot_bgcolor: '#262730',
                font: { color: '#fafafa' },
                height: 400,
                xaxis: { gridcolor: '#3a3f4a' },
                yaxis: { gridcolor: '#3a3f4a' }
            };
            
            Plotly.newPlot('klineChart', [kline], layout);
            
            // 成交量图
            const volColors = closes.map((c, i) => c >= opens[i] ? '#ff6b6b' : '#51cf66');
            const volumeTrace = {
                x: dates,
                y: volumes,
                type: 'bar',
                marker: { color: volColors },
                name: '成交量'
            };
            
            Plotly.newPlot('volumeChart', [volumeTrace], {
                title: '成交量',
                paper_bgcolor: '#262730',
                plot_bgcolor: '#262730',
                font: { color: '#fafafa' },
                height: 250,
                xaxis: { gridcolor: '#3a3f4a' },
                yaxis: { gridcolor: '#3a3f4a' }
            });
        }
        
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
            document.getElementById('queryBtn').disabled = false;
        }
        
        // 回车键查询
        document.getElementById('stockCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryStock();
            }
        });
        
        // 初始化
        window.onload = function() {
            queryStock();
        };
    </script>
</body>
</html>
