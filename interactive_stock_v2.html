<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingAgents 股票分析工具 v2</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #0e1117; color: #fafafa; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 标题 */
        .header { text-align: center; padding: 25px; background: linear-gradient(135deg, #1a1d23 0%, #262730 100%); border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header .subtitle { color: #888; font-size: 14px; }
        .header .mode-tag { display: inline-block; padding: 4px 12px; background: #4CAF50; border-radius: 12px; font-size: 12px; margin-top: 10px; }
        
        /* 选股区域 */
        .search-section { background: #262730; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .search-section h2 { margin-bottom: 15px; font-size: 20px; }
        .search-box { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .search-box input { flex: 1; min-width: 200px; padding: 12px 18px; border-radius: 8px; border: 2px solid #3a3f4a; background: #1a1d23; color: white; font-size: 16px; }
        .search-box input:focus { outline: none; border-color: #4CAF50; }
        .search-box button { padding: 12px 30px; background: linear-gradient(135deg, #4CAF50, #45a049); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .search-box button:hover { transform: scale(1.05); }
        .search-box button:disabled { background: #555; cursor: not-allowed; transform: none; }
        
        /* 常用股票快捷选择 */
        .quick-stocks { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .quick-stock { padding: 8px 16px; background: #3a3f4a; border: none; border-radius: 20px; color: white; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .quick-stock:hover { background: #4CAF50; }
        
        /* 股票信息卡片 */
        .stock-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .info-card { background: #262730; border-radius: 12px; padding: 20px; text-align: center; }
        .info-card .label { color: #888; font-size: 14px; margin-bottom: 8px; }
        .info-card .value { font-size: 24px; font-weight: bold; }
        .info-card .sub { font-size: 14px; margin-top: 5px; }
        .positive { color: #ff6b6b; }
        .negative { color: #51cf66; }
        
        /* 技术指标 */
        .indicators { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .indicator-card { background: #262730; border-radius: 12px; padding: 15px; text-align: center; }
        .indicator-card .label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .indicator-card .value { font-size: 18px; font-weight: bold; }
        
        /* AI分析区域 */
        .analysis-section { background: #262730; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .analysis-section h2 { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .analysis-controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-primary { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; }
        .btn-secondary { background: #3a3f4a; color: white; }
        .btn-warning { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; }
        .btn-danger { background: linear-gradient(135deg, #f44336, #d32f2f); color: white; }
        
        .analysis-textarea { 
            width: 100%; 
            min-height: 120px; 
            padding: 15px; 
            border-radius: 8px; 
            border: 2px solid #3a3f4a; 
            background: #1a1d23; 
            color: white; 
            font-size: 15px; 
            line-height: 1.6; 
            resize: vertical;
            font-family: 'Consolas', monospace;
        }
        .analysis-textarea:focus { outline: none; border-color: #4CAF50; }
        
        .analysis-result { margin-top: 20px; }
        .analysis-item { padding: 15px; margin: 10px 0; border-radius: 8px; }
        .analysis-basic { background: linear-gradient(135deg, #1a4731, #2d5a42); border-left: 4px solid #4CAF50; }
        .analysis-tech { background: linear-gradient(135deg, #1a3a47, #2a4a5a); border-left: 4px solid #2196F3; }
        .analysis-fund { background: linear-gradient(135deg, #473a1a, #5a4a2a); border-left: 4px solid #ff9800; }
        .analysis-advice-buy { background: linear-gradient(135deg, #1a4731, #2d5a42); border-left: 4px solid #4CAF50; }
        .analysis-advice-sell { background: linear-gradient(135deg, #5a1a1a, #6a2a2a); border-left: 4px solid #f44336; }
        .analysis-advice-hold { background: linear-gradient(135deg, #3a3a1a, #4a4a2a); border-left: 4px solid #ff9800; }
        
        .analysis-loading { 
            text-align: center; 
            padding: 30px; 
            color: #888;
            background: #1a1d23;
            border-radius: 8px;
            margin-top: 15px;
        }
        .loading-spinner { 
            width: 40px; 
            height: 40px; 
            border: 4px solid #3a3f4a; 
            border-top-color: #4CAF50; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 图表区域 */
        .chart-section { background: #262730; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        
        /* 加载状态 */
        .loading { text-align: center; padding: 40px; color: #888; }
        
        /* 错误提示 */
        .error { background: #5a2a2a; color: #ff6b6b; padding: 15px; border-radius: 8px; margin: 15px 0; }
        
        /* 摘要区域 */
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        /* 数据源指示器 */
        .data-source { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .data-source.live { background: #1a4731; color: #51cf66; }
        .data-source.demo { background: #473a1a; color: #ff9800; }
        .data-source .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        
        /* 启动后端按钮 */
        .start-backend-btn {
            position: fixed;
            top: 70px;
            right: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
            transition: all 0.3s ease;
        }
        .start-backend-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
        }
        .start-backend-btn:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        /* 自动同步指示器 */
        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #888;
            margin-left: 10px;
        }
        .sync-indicator.synced { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="data-source demo" id="dataSource">
        <span class="dot"></span>
        <span>检测中...</span>
    </div>
    <button id="startBackendBtn" class="start-backend-btn" onclick="startBackendService()" style="display:none;">
        🚀 启动实时数据服务
    </button>
    
    <div class="container">
        <div class="header">
            <h1>📈 TradingAgents 股票分析工具</h1>
            <p class="subtitle">基于 AkShare 实时数据 | 支持 AI 分析结论同步更新</p>
            <div class="mode-tag">v2.0 增强版</div>
        </div>
        
        <!-- 选股区域 -->
        <div class="search-section">
            <h2>🎯 股票选择</h2>
            <div class="search-box">
                <input type="text" id="stockCode" placeholder="输入股票代码（如 000001, 600519）" value="000833">
                <button onclick="queryStock()" id="queryBtn">🔍 查询</button>
                <button onclick="refreshRealTimeData()" id="refreshBtn" style="background: linear-gradient(135deg, #2196F3, #1976D2);">🔄 刷新实时数据</button>
            </div>
            <div class="quick-stocks">
                <button class="quick-stock" onclick="selectStock('000001')">平安银行</button>
                <button class="quick-stock" onclick="selectStock('600519')">贵州茅台</button>
                <button class="quick-stock" onclick="selectStock('300750')">宁德时代</button>
                <button class="quick-stock" onclick="selectStock('002594')">比亚迪</button>
                <button class="quick-stock" onclick="selectStock('600036')">招商银行</button>
                <button class="quick-stock" onclick="selectStock('601318')">中国平安</button>
            </div>
        </div>
        
        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display:none;">
            <div class="loading-spinner"></div>
            <p>正在加载数据...</p>
        </div>
        
        <!-- 错误提示 -->
        <div id="error" class="error" style="display:none;"></div>
        
        <!-- 股票信息 -->
        <div id="stockInfo" style="display:none;">
            <div class="stock-info">
                <div class="info-card">
                    <div class="label">股票名称</div>
                    <div class="value" id="stockName">--</div>
                </div>
                <div class="info-card">
                    <div class="label">当前价格</div>
                    <div class="value" id="currentPrice">--</div>
                </div>
                <div class="info-card">
                    <div class="label">涨跌幅</div>
                    <div class="value" id="changePct">--</div>
                </div>
                <div class="info-card">
                    <div class="label">成交量</div>
                    <div class="value" id="volume">--</div>
                </div>
                <div class="info-card">
                    <div class="label">成交额</div>
                    <div class="value" id="amount">--</div>
                </div>
            </div>
            
            <div class="indicators">
                <div class="indicator-card">
                    <div class="label">RSI(14)</div>
                    <div class="value" id="rsi">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">MACD</div>
                    <div class="value" id="macd">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">MA5</div>
                    <div class="value" id="ma5">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">MA10</div>
                    <div class="value" id="ma10">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">MA20</div>
                    <div class="value" id="ma20">--</div>
                </div>
            </div>
            
            <!-- AI分析区域 -->
            <div class="analysis-section">
                <h2>
                    🤖 AI 分析结论
                    <span class="sync-indicator synced" id="syncIndicator">✓ 已同步</span>
                </h2>
                <div class="analysis-controls">
                    <button class="btn btn-primary" onclick="runAIAnalysis()" id="aiBtn">
                        <span>🚀</span> 运行AI分析
                    </button>
                    <button class="btn btn-secondary" onclick="syncAnalysis()" id="syncBtn">
                        <span>🔄</span> 同步更新显示
                    </button>
                    <button class="btn btn-warning" onclick="loadTemplate()" id="templateBtn">
                        <span>📋</span> 加载模板
                    </button>
                    <button class="btn btn-danger" onclick="clearAIResult()" id="clearBtn">
                        <span>🗑️</span> 清空结论
                    </button>
                </div>
                
                <textarea class="analysis-textarea" id="analysisInput" 
                    placeholder="在此输入或粘贴 AI 分析结论...
                    
例如：
1. 基本面：银行业整体受益于金融政策支持，基本面正面
2. 技术面：呈上升趋势，支撑位 10.50 元，压力位 11.50 元
3. 资金面：主力资金持续流入
4. 综合建议：买入"></textarea>
                
                <!-- 分析加载状态 -->
                <div class="analysis-loading" id="analysisLoading" style="display:none;">
                    <div class="loading-spinner"></div>
                    <p>🤖 AI 正在分析中，请稍候...</p>
                    <p style="font-size: 12px; margin-top: 10px;">这可能需要几秒钟时间</p>
                </div>
                
                <!-- 分析结果展示 -->
                <div class="analysis-result" id="analysisResult"></div>
            </div>
            
            <!-- 摘要 -->
            <div class="summary" id="summary">
                <div class="indicator-card">
                    <div class="label">近期趋势</div>
                    <div class="value" id="trend">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">支撑位</div>
                    <div class="value" id="support">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">压力位</div>
                    <div class="value" id="resistance">--</div>
                </div>
                <div class="indicator-card">
                    <div class="label">成交量变化</div>
                    <div class="value" id="volChange">--</div>
                </div>
            </div>
            
            <!-- 图表 -->
            <div class="chart-section">
                <div id="klineChart"></div>
            </div>
            <div class="chart-section">
                <div id="volumeChart"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 股票代码与名称映射（常用股票）
        const stockNames = {
            // 银行
            '000001': '平安银行', '600036': '招商银行', '601398': '工商银行',
            '601939': '建设银行', '601288': '农业银行', '601988': '中国银行',
            '600015': '华夏银行', '600016': '民生银行', '601229': '上海银行',
            '600926': '杭州银行', '600919': '江苏银行', '002142': '宁波银行',
            '002807': '无锡银行', '002948': '青岛银行', '002966': '苏州银行',
            // 白酒
            '600519': '贵州茅台', '000858': '五粮液', '000568': '泸州老窖',
            '000596': '古井贡酒', '600809': '山西汾酒', '002304': '洋河股份',
            '603589': '金种子酒', '000799': '酒鬼酒', '600197': '伊力特',
            '603198': '迎驾贡酒', '600779': '水井坊', '603517': '绝味食品',
            // 科技/新能源
            '300750': '宁德时代', '002594': '比亚迪', '002475': '立讯精密',
            '000333': '美的集团', '000651': '格力电器', '600276': '恒瑞医药',
            '002230': '科大讯飞', '601012': '隆基绿能', '600703': '三安光电',
            '300059': '东方财富', '300015': '爱尔眼科', '002410': '广联达',
            '002444': '巨星科技', '601888': '中国中免',
            // 证券/金融
            '600030': '中信证券', '601688': '中国中车', '601318': '中国平安',
            '601166': '兴业银行', '600000': '浦发银行',
            // 其他
            '002027': '分众传媒', '002415': '海康威视', '000002': '万科A',
            '600009': '上海机场', '300142': '沃森生物', '300896': '爱博医疗',
            '002311': '海大集团', '002353': '杰瑞股份', '000833': '粤桂股份',
            '000861': '海印股份', '000895': '系数未名'
        };
        
        // 页面加载完成后快速检测后端服务（优化执行时间）
        document.addEventListener('DOMContentLoaded', function() {
            // 使用requestIdleCallback或快速超时，不阻塞页面加载
            if ('requestIdleCallback' in window) {
                requestIdleCallback(() => checkBackendService(), { timeout: 1000 });
            } else {
                setTimeout(() => checkBackendService(), 200); // 缩短到200ms
            }
            
            // 空闲时预加载JSON缓存（加速后续查询）
            if ('requestIdleCallback' in window) {
                requestIdleCallback(() => loadFromJSON('000001').catch(() => {}), { timeout: 3000 });
            }
        });
        
        // 获取股票名称（优先从映射表，否则返回代码）
        function getStockName(code) {
            code = code.toUpperCase();
            return stockNames[code] || ('股票(' + code + ')');
        }
        
        // JSON数据缓存
        let stockDataCache = null;
        
        // 后端服务状态
        let backendAvailable = false;
        let backendChecking = false;
        
        // 检测后端服务是否可用
        async function checkBackendService() {
            if (backendChecking) return backendAvailable;
            backendChecking = true;
            
            try {
                // 缩短超时时间到1秒，提升响应速度
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1000);
                
                const response = await fetch('http://localhost:5000/api/health', {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    backendAvailable = true;
                    console.log('后端服务已连接');
                }
            } catch (e) {
                backendAvailable = false;
                console.log('后端服务未运行，将使用本地数据');
            }
            
            backendChecking = false;
            updateServiceStatus();
            return backendAvailable;
        }
        
        // 更新服务状态显示
        function updateServiceStatus() {
            const indicator = document.getElementById('dataSource');
            const startBtn = document.getElementById('startBackendBtn');
            
            if (backendAvailable) {
                indicator.className = 'data-source live';
                indicator.innerHTML = '<span class="dot"></span><span>实时数据服务已连接</span>';
                if (startBtn) startBtn.style.display = 'none';
            } else {
                indicator.className = 'data-source demo';
                indicator.innerHTML = '<span class="dot"></span><span>演示模式 - 后端未启动</span>';
                // 显示启动按钮
                if (startBtn) {
                    startBtn.style.display = 'inline-flex';
                }
            }
        }
        
        // 启动后端服务
        async function startBackendService() {
            const btn = document.getElementById('startBackendBtn');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '⏳ 启动中...';
            }
            
            // 打开命令行窗口启动服务
            const cmd = 'cmd /c start cmd /k "cd /d ' + 
                'c:\\Users\\13905\\WorkBuddy\\Claw\\TradingAgents-CN && ' + 
                'python web_api.py"';
            
            try {
                // 使用 PowerShell 打开新窗口
                const psCmd = 'Start-Process cmd -ArgumentList "/c", "cd /d c:\\Users\\13905\\WorkBuddy\\Claw\\TradingAgents-CN && python web_api.py" -Verb RunAs';
                await new Promise(resolve => {
                    const script = document.createElement('script');
                    script.textContent = `
                        // 通过 iframe 触发命令执行（需要用户授权）
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = 'javascript:void(0)';
                        document.body.appendChild(iframe);
                    `;
                    document.body.appendChild(script);
                });
                
                // 提示用户手动启动
                alert('请在新打开的终端窗口中运行: python web_api.py\n\n或者双击运行目录下的 web_api.py 文件');
                
                // 缩短重检时间到2秒
                setTimeout(async () => {
                    await checkBackendService();
                }, 2000);
            } catch (e) {
                console.error('启动失败:', e);
                alert('无法自动启动，请手动运行: python web_api.py');
            }
            
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '🚀 启动实时数据服务';
            }
        }
        
        // 从实时API获取数据（优先使用，带超时优化）
        async function fetchFromAPI(code) {
            if (!backendAvailable) {
                // 尝试快速检测
                await checkBackendService();
                if (!backendAvailable) return null;
            }
            
            try {
                // 添加请求超时（2秒）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                
                const response = await fetch('http://localhost:5000/api/stock/' + code, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    return await response.json();
                }
            } catch (e) {
                console.log('API调用失败:', e);
            }
            return null;
        }
        
        // 从JSON加载真实数据（备用）
        async function loadFromJSON(code) {
            try {
                // 使用缓存
                if (!stockDataCache) {
                    const response = await fetch('stock_data.json');
                    if (response.ok) {
                        stockDataCache = await response.json();
                    }
                }
                
                if (stockDataCache && stockDataCache[code]) {
                    return stockDataCache[code];
                }
            } catch (e) {
                console.log('无法加载JSON数据:', e);
            }
            return null;
        }
        
        // 智能数据获取：并行优先获取，优先使用API > JSON缓存 > 演示数据（优化执行时间）
        async function fetchStockData(code) {
            // 并行发起API和JSON请求，谁先返回用谁
            const [apiData, jsonData] = await Promise.all([
                fetchFromAPI(code).catch(() => null),  // API请求
                loadFromJSON(code).catch(() => null)   // JSON请求
            ]);
            
            // 优先使用API数据
            if (apiData) {
                updateDataSourceIndicator(true);
                return apiData;
            }
            
            // 回退到JSON缓存
            if (jsonData) {
                updateDataSourceIndicator(true);
                return jsonData;
            }
            
            // 最后使用演示数据
            return null;
        }
        
        // 存储当前股票数据
        let currentStockData = null;
        let currentCode = '';
        
        // 选择股票
        function selectStock(code) {
            document.getElementById('stockCode').value = code;
            queryStock();
        }
        
        // 查询股票（智能数据获取）
        async function queryStock() {
            const code = document.getElementById('stockCode').value.trim().toUpperCase();
            if (!code) {
                showError('请输入股票代码');
                return;
            }
            
            currentCode = code;
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('stockInfo').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('queryBtn').disabled = true;
            document.getElementById('refreshBtn').disabled = true;
            
            // 智能数据获取：实时API > JSON缓存 > 演示数据
            const stockData = await fetchStockData(code);
            
            if (stockData) {
                // 使用真实/缓存数据
                displayStockData(stockData);
            } else {
                // 使用演示数据（移除延迟，提升响应速度）
                showDemoData(code);
            }
        }
        
        // 刷新实时数据（强制从API获取）
        async function refreshRealTimeData() {
            const code = document.getElementById('stockCode').value.trim().toUpperCase();
            if (!code) {
                showError('请输入股票代码');
                return;
            }
            
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ 获取中...';
            
            // 强制检测后端服务
            await checkBackendService();
            
            if (!backendAvailable) {
                // 后端未运行，提示用户
                btn.disabled = false;
                btn.innerHTML = '🔄 刷新实时数据';
                showError('实时数据服务未启动。点击右上角"启动实时数据服务"按钮启动后端。');
                
                // 显示启动按钮
                const startBtn = document.getElementById('startBackendBtn');
                if (startBtn) startBtn.style.display = 'inline-flex';
                
                return;
            }
            
            try {
                // 强制从API获取
                const response = await fetch('http://localhost:5000/api/stock/' + code);
                if (response.ok) {
                    const data = await response.json();
                    displayStockData(data);
                    updateDataSourceIndicator(true);
                } else {
                    showError('获取数据失败，状态码: ' + response.status);
                }
            } catch (e) {
                console.log('API调用失败:', e);
                showError('实时数据服务连接失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔄 刷新实时数据';
            }
        }
        
        // 显示真实股票数据
        function displayStockData(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stockInfo').style.display = 'block';
            document.getElementById('queryBtn').disabled = false;
            
            // 基本信息（防御性：如果API返回名称为空，使用本地映射表）
            const stockName = (data.name && data.name !== '未知' && data.name.trim() !== '') 
                ? data.name 
                : getStockName(code);
            document.getElementById('stockName').textContent = stockName;
            document.getElementById('currentPrice').textContent = '¥' + data.price.toFixed(2);
            
            const changePctEl = document.getElementById('changePct');
            changePctEl.textContent = (data.change_pct >= 0 ? '+' : '') + data.change_pct.toFixed(2) + '%';
            changePctEl.className = 'value ' + (data.change_pct >= 0 ? 'positive' : 'negative');
            
            document.getElementById('volume').textContent = formatNumber(data.volume);
            document.getElementById('amount').textContent = formatAmount(data.amount);
            
            // 技术指标（添加空值保护）
            const rsi = data.rsi !== undefined && data.rsi !== null ? data.rsi.toFixed(2) : '-';
            document.getElementById('rsi').textContent = rsi;
            
            const macd = data.macd !== undefined && data.macd !== null ? data.macd : 0;
            const macdEl = document.getElementById('macd');
            macdEl.textContent = macd.toFixed(4);
            macdEl.className = 'value ' + (macd >= 0 ? 'positive' : 'negative');
            
            const ma5 = data.ma5 !== undefined && data.ma5 !== null ? '¥' + data.ma5.toFixed(2) : '-';
            const ma10 = data.ma10 !== undefined && data.ma10 !== null ? '¥' + data.ma10.toFixed(2) : '-';
            const ma20 = data.ma20 !== undefined && data.ma20 !== null ? '¥' + data.ma20.toFixed(2) : '-';
            document.getElementById('ma5').textContent = ma5;
            document.getElementById('ma10').textContent = ma10;
            document.getElementById('ma20').textContent = ma20;
            
            // 摘要
            document.getElementById('trend').textContent = data.trend || '-';
            document.getElementById('support').textContent = data.support ? '¥' + data.support.toFixed(2) : '-';
            document.getElementById('resistance').textContent = data.resistance ? '¥' + data.resistance.toFixed(2) : '-';
            
            const volChangeEl = document.getElementById('volChange');
            volChangeEl.textContent = (data.vol_change >= 0 ? '+' : '') + data.vol_change.toFixed(1) + '%';
            volChangeEl.className = 'value ' + (data.vol_change >= 0 ? 'positive' : 'negative');
            
            // 保存当前数据
            currentStockData = data;
            
            // K线图
            if (data.kline && data.kline.length > 0) {
                renderKlineChart(data.kline);
            } else {
                loadDemoChart();
            }
            
            // 自动同步更新分析
            syncAnalysis();
            
            // 更新数据源指示器
            updateDataSourceIndicator(true);
        }
        
        // 更新数据源指示器
        function updateDataSourceIndicator(isLive) {
            const indicator = document.getElementById('dataSource');
            if (isLive) {
                indicator.className = 'data-source live';
                indicator.innerHTML = '<span class="dot"></span><span>实时数据</span>';
            } else {
                indicator.className = 'data-source demo';
                indicator.innerHTML = '<span class="dot"></span><span>演示模式</span>';
            }
        }
        
        // 显示演示数据
        function showDemoData(code) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stockInfo').style.display = 'block';
            document.getElementById('queryBtn').disabled = false;
            
            const name = getStockName(code);
            
            // 模拟数据
            const basePrice = 10 + Math.random() * 100;
            const changePct = (Math.random() - 0.5) * 10;
            const volume = Math.floor(Math.random() * 100000000 + 10000000);
            const amount = volume * basePrice;
            
            // 技术指标
            const rsi = 30 + Math.random() * 40;
            const macd = (Math.random() - 0.5) * 2;
            const ma5 = basePrice * (0.98 + Math.random() * 0.04);
            const ma10 = basePrice * (0.96 + Math.random() * 0.08);
            const ma20 = basePrice * (0.94 + Math.random() * 0.12);
            
            // 支撑压力
            const support = basePrice * 0.9;
            const resistance = basePrice * 1.1;
            const volChange = (Math.random() - 0.3) * 30;
            
            // 更新界面
            document.getElementById('stockName').textContent = name;
            document.getElementById('currentPrice').textContent = '¥' + basePrice.toFixed(2);
            
            const changePctEl = document.getElementById('changePct');
            changePctEl.textContent = (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%';
            changePctEl.className = 'value ' + (changePct >= 0 ? 'positive' : 'negative');
            
            document.getElementById('volume').textContent = formatNumber(volume);
            document.getElementById('amount').textContent = formatAmount(amount);
            
            // 技术指标
            document.getElementById('rsi').textContent = rsi.toFixed(2);
            
            const macdEl = document.getElementById('macd');
            macdEl.textContent = macd.toFixed(4);
            macdEl.className = 'value ' + (macd >= 0 ? 'positive' : 'negative');
            
            document.getElementById('ma5').textContent = '¥' + ma5.toFixed(2);
            document.getElementById('ma10').textContent = '¥' + ma10.toFixed(2);
            document.getElementById('ma20').textContent = '¥' + ma20.toFixed(2);
            
            // 摘要（趋势判断更智能）
            let trend = '震荡';
            if (ma5 > ma20 * 1.02) trend = '上涨';
            else if (ma5 < ma20 * 0.98) trend = '下跌';
            document.getElementById('trend').textContent = trend;
            document.getElementById('support').textContent = '¥' + support.toFixed(2);
            document.getElementById('resistance').textContent = '¥' + resistance.toFixed(2);
            
            const volChangeEl = document.getElementById('volChange');
            volChangeEl.textContent = (volChange >= 0 ? '+' : '') + volChange.toFixed(1) + '%';
            volChangeEl.className = 'value ' + (volChange >= 0 ? 'positive' : 'negative');
            
            // 保存当前数据
            currentStockData = {
                name, code, price: basePrice, changePct, volume, amount,
                rsi, macd, ma5, ma10, ma20, support, resistance, volChange, trend
            };
            
            // 生成K线图
            loadDemoChart();
            
            // 自动同步更新分析
            syncAnalysis();
            
            // 更新数据源指示器
            updateDataSourceIndicator(false);
        }
        
        // 生成演示K线图
        function loadDemoChart() {
            const dates = [];
            const opens = [], highs = [], lows = [], closes = [];
            const volumes = [];
            
            let price = currentStockData ? currentStockData.price * 0.9 : 10;
            const now = new Date();
            for (let i = 60; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]);
                
                const change = (Math.random() - 0.45) * price * 0.04;
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * price * 0.02;
                const low = Math.min(open, close) - Math.random() * price * 0.02;
                
                opens.push(open);
                highs.push(high);
                lows.push(low);
                closes.push(close);
                volumes.push(Math.floor(Math.random() * 10000000 + 5000000));
                
                price = close;
            }
            
            const klineData = dates.map((d, i) => ({
                '日期': d,
                '开盘': opens[i],
                '最高': highs[i],
                '最低': lows[i],
                '收盘': closes[i],
                '成交量': volumes[i]
            }));
            
            renderKlineChart(klineData);
        }
        
        // 渲染K线图
        function renderKlineChart(klineData) {
            const dates = klineData.map(d => d['日期']);
            const opens = klineData.map(d => d['开盘']);
            const highs = klineData.map(d => d['最高']);
            const lows = klineData.map(d => d['最低']);
            const closes = klineData.map(d => d['收盘']);
            const volumes = klineData.map(d => d['成交量']);
            
            // K线图
            const kline = {
                x: dates,
                type: 'candlestick',
                open: opens,
                high: highs,
                low: lows,
                close: closes,
                name: 'K线'
            };
            
            const layout = {
                title: 'K线走势',
                paper_bgcolor: '#262730',
                plot_bgcolor: '#262730',
                font: { color: '#fafafa' },
                height: 400,
                xaxis: { gridcolor: '#3a3f4a', rangeslider: {visible: false} },
                yaxis: { gridcolor: '#3a3f4a' }
            };
            
            Plotly.newPlot('klineChart', [kline], layout);
            
            // 成交量图
            const volColors = closes.map((c, i) => c >= opens[i] ? '#ff6b6b' : '#51cf66');
            const volumeTrace = {
                x: dates,
                y: volumes,
                type: 'bar',
                marker: { color: volColors },
                name: '成交量'
            };
            
            Plotly.newPlot('volumeChart', [volumeTrace], {
                title: '成交量',
                paper_bgcolor: '#262730',
                plot_bgcolor: '#262730',
                font: { color: '#fafafa' },
                height: 200,
                xaxis: { gridcolor: '#3a3f4a' },
                yaxis: { gridcolor: '#3a3f4a' }
            });
        }
        
        // 运行AI分析（演示）
        function runAIAnalysis() {
            const aiBtn = document.getElementById('aiBtn');
            const loadingEl = document.getElementById('analysisLoading');
            const resultEl = document.getElementById('analysisResult');
            const inputEl = document.getElementById('analysisInput');
            const syncIndicator = document.getElementById('syncIndicator');
            
            aiBtn.disabled = true;
            loadingEl.style.display = 'block';
            resultEl.innerHTML = '';
            
            // 模拟AI分析延迟
            setTimeout(() => {
                // 生成基于当前数据的分析
                const analysis = generateAnalysis();
                inputEl.value = analysis;
                
                // 同步更新显示
                updateAnalysisDisplay(analysis);
                
                loadingEl.style.display = 'none';
                aiBtn.disabled = false;
                
                // 更新同步状态
                syncIndicator.innerHTML = '✓ 已同步';
                syncIndicator.className = 'sync-indicator synced';
            }, 1500);
        }
        
        // 生成分析文本
        function generateAnalysis() {
            if (!currentStockData) {
                return `1. 基本面：该公司行业地位稳固，财务状况良好
2. 技术面：股价处于震荡整理阶段，建议关注支撑位和压力位
3. 资金面：成交量维持在正常水平
4. 综合建议：持有观望`;
            }
            
            const { name, changePct, rsi, macd, trend, support, resistance, volChange } = currentStockData;
            
            // 基本面分析
            const sectorAnalysis = getSectorAnalysis(name);
            
            // 技术面分析
            let techAdvice = '';
            if (rsi > 70) techAdvice = 'RSI显示超买信号，注意回调风险';
            else if (rsi < 30) techAdvice = 'RSI显示超卖信号，可能存在反弹机会';
            else techAdvice = 'RSI处于正常区间';
            
            const macdSignal = macd >= 0 ? 'MACD金叉向上' : 'MACD死叉向下';
            
            // 资金面分析
            const fundAdvice = volChange > 10 ? '成交量明显放大，资金积极进场' : 
                              volChange < -10 ? '成交量萎缩，资金观望情绪浓厚' :
                              '成交量平稳，资金进出平衡';
            
            // 综合建议
            let advice = '持有';
            if (changePct > 3 && rsi < 65 && macd > 0) advice = '买入';
            else if (changePct < -3 || rsi > 75) advice = '卖出';
            else if (rsi < 35 && macd > -0.5) advice = '可以关注';
            
            return `1. 基本面：${name}所在行业${sectorAnalysis}
2. 技术面：当前${trend}趋势，${macdSignal}，${techAdvice}，支撑位 ¥${support.toFixed(2)}，压力位 ¥${resistance.toFixed(2)}
3. 资金面：${fundAdvice}
4. 综合建议：${advice}`;
        }
        
        // 获取行业分析
        function getSectorAnalysis(stockName) {
            const sectorMap = {
                '平安银行': '银行业整体受益于金融政策支持，基本面正面',
                '招商银行': '银行业龙头，盈利能力稳定',
                '贵州茅台': '白酒行业龙头，品牌价值突出，业绩稳定增长',
                '宁德时代': '新能源电池行业龙头，受益于新能源汽车发展',
                '比亚迪': '新能源汽车行业领军企业，销量持续增长',
                '中国平安': '保险行业龙头，综合金融优势明显'
            };
            return sectorMap[stockName] || '行业运行平稳，需关注公司基本面变化';
        }
        
        // 同步更新分析显示
        function syncAnalysis() {
            const inputEl = document.getElementById('analysisInput');
            const text = inputEl.value;
            
            if (text.trim()) {
                updateAnalysisDisplay(text);
                
                // 更新同步状态
                const syncIndicator = document.getElementById('syncIndicator');
                syncIndicator.innerHTML = '✓ 已同步';
                syncIndicator.className = 'sync-indicator synced';
            }
        }
        
        // 更新分析显示
        function updateAnalysisDisplay(text) {
            const resultEl = document.getElementById('analysisResult');
            const lines = text.split('\n').filter(l => l.trim());
            
            let html = '';
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                // 移除数字前缀
                line = line.replace(/^\d+\.\s*/, '');
                
                let className = 'analysis-item';
                if (line.includes('基本面')) {
                    className += ' analysis-basic';
                } else if (line.includes('技术面')) {
                    className += ' analysis-tech';
                } else if (line.includes('资金面')) {
                    className += ' analysis-fund';
                } else if (line.includes('建议') || line.includes('综合')) {
                    if (line.includes('买入') || line.includes('增持') || line.includes('看好')) {
                        className += ' analysis-advice-buy';
                    } else if (line.includes('卖出') || line.includes('减持') || line.includes('看空')) {
                        className += ' analysis-advice-sell';
                    } else {
                        className += ' analysis-advice-hold';
                    }
                }
                
                // 添加图标
                let icon = '• ';
                if (line.includes('基本面')) icon = '💰 ';
                else if (line.includes('技术面')) icon = '📈 ';
                else if (line.includes('资金面')) icon = '💵 ';
                else if (line.includes('建议') || line.includes('综合')) icon = '🎯 ';
                
                html += '<div class="' + className + '">' + icon + line + '</div>';
            }
            
            resultEl.innerHTML = html;
        }
        
        // 加载模板
        function loadTemplate() {
            const inputEl = document.getElementById('analysisInput');
            inputEl.value = `1. 基本面：[填写基本面分析]
2. 技术面：[填写技术面分析，包括支撑位、压力位、均线等]
3. 资金面：[填写资金面分析，包括主力资金流向、成交量变化等]
4. 综合建议：[填写买入/卖出/持有建议]`;
            
            syncAnalysis();
        }
        
        // 清空结论
        function clearAIResult() {
            document.getElementById('analysisInput').value = '';
            document.getElementById('analysisResult').innerHTML = '';
            
            // 重置同步状态
            const syncIndicator = document.getElementById('syncIndicator');
            syncIndicator.innerHTML = '○ 未同步';
            syncIndicator.className = 'sync-indicator';
        }
        
        // 格式化数字（成交量）
        function formatNumber(num) {
            if (num === undefined || num === null || isNaN(num)) return '-';
            if (num >= 100000000) return (num / 100000000).toFixed(2) + '手';
            if (num >= 10000) return (num / 10000).toFixed(2) + '手';
            return num.toString();
        }
        
        // 格式化金额
        function formatAmount(num) {
            if (num === undefined || num === null || isNaN(num)) return '-';
            if (num >= 100000000) return '¥' + (num / 100000000).toFixed(2) + '亿';
            if (num >= 10000) return '¥' + (num / 10000).toFixed(2) + '万';
            return '¥' + num.toFixed(2);
        }
        
        // 显示错误
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
            document.getElementById('queryBtn').disabled = false;
        }
        
        // 回车键查询
        document.getElementById('stockCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') queryStock();
        });
        
        // 输入时自动同步（防抖）
        let syncTimeout;
        document.getElementById('analysisInput').addEventListener('input', function() {
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(syncAnalysis, 500);
            
            // 更新同步状态
            const syncIndicator = document.getElementById('syncIndicator');
            syncIndicator.innerHTML = '↻ 同步中...';
            syncIndicator.className = 'sync-indicator';
        });
        
        // 初始化
        window.onload = function() {
            queryStock();
        };
    </script>
</body>
