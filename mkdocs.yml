# MkDocs 配置
# 用于生成 TradingAgents-CN API 文档

site_name: TradingAgents-CN Documentation
site_description: TradingAgents-CN 量化交易智能体系统 API 文档
site_author: TradingAgents Team
site_url: https://tradingagents-cn.github.io/docs

# 仓库配置
repo_name: TradingAgents-CN
repo_url: https://github.com/TradingAgents-CN/TradingAgents-CN
edit_uri: edit/main/docs/

# 主题配置
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: 切换到浅色模式

# 导航结构
nav:
  - 首页:
    - 简介: index.md
    - 快速开始: quickstart.md
    - 安装指南: installation.md
  - API 参考:
    - Core: api/core.md
    - Dataflows: api/dataflows.md
    - Strategies: api/strategies.md
    - Backtest: api/backtest.md
    - Dashboard: api/dashboard.md
  - 开发指南:
    - 架构设计: dev/architecture.md
    - 贡献指南: dev/contributing.md
    - 代码规范: dev/coding-style.md
  - 更多:
    - FAQ: faq.md
    - 更新日志: changelog.md

# Markdown 扩展
markdown_extensions:
  - admonition
  - attr_list
  - codehilite:
      guess_lang: false
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 插件配置
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            separate_signature: true
            show_signature_annotations: true
  - git-revision-date-localized:
      type: datetime
      enable_creation_date: true
